<svg viewBox="0 0 1400 680" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <pattern id="grid" width="56" height="56" patternUnits="userSpaceOnUse">
      <path d="M 56 0 L 0 0 0 56" fill="none" stroke="rgba(255,255,255,0.05)" stroke-width="1"/>
    </pattern>
    <marker id="arrowhead" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto">
      <path d="M0,0 L0,6 L9,3 z" fill="#1E8FAD"/>
    </marker>
    <marker id="arrowhead-back" markerWidth="10" markerHeight="10" refX="2" refY="3" orient="auto">
      <path d="M9,0 L9,6 L0,3 z" fill="#1E8FAD"/>
    </marker>
  </defs>

  <rect width="1400" height="680" fill="#0D1B2A"/>
  <rect width="1400" height="680" fill="url(#grid)"/>

  <text x="700" y="120" text-anchor="middle" font-family="Arial Narrow, Arial, sans-serif" font-weight="700" font-size="40" letter-spacing="1" fill="#FFFFFF">REGENT <tspan fill="#1E8FAD">INTEL</tspan></text>
  <text x="700" y="150" text-anchor="middle" font-family="Courier New, monospace" font-size="14" letter-spacing="3" fill="rgba(255,255,255,0.45)">THE OPERATIONAL DOCTRINE</text>

  <!-- Main path -->
  <line x1="150" y1="310" x2="1290" y2="310" stroke="#1E8FAD" stroke-width="1.5" marker-end="url(#arrowhead)" opacity="0.9"/>

  <!-- Nodes -->
  <g font-family="Arial Narrow, Arial, sans-serif" font-weight="700" font-size="17" letter-spacing="1.5">
    <text x="230" y="265" text-anchor="middle" fill="rgba(255,255,255,0.7)">ASSESSMENT</text>
    <text x="610" y="265" text-anchor="middle" fill="rgba(255,255,255,0.7)">INTELLIGENCE</text>
    <text x="990" y="265" text-anchor="middle" fill="rgba(255,255,255,0.7)">DESIGN</text>
    <text x="1200" y="265" text-anchor="middle" fill="rgba(255,255,255,0.7)">EXECUTION</text>
  </g>
  <g font-family="Courier New, monospace" font-size="12" letter-spacing="0.5">
    <text x="230" y="360" text-anchor="middle" fill="rgba(255,255,255,0.4)">EXPOSURE &amp; THREAT MAPPING</text>
    <text x="610" y="360" text-anchor="middle" fill="rgba(255,255,255,0.4)">CONTINUOUS COLLECTION &amp; ANALYSIS</text>
    <text x="990" y="360" text-anchor="middle" fill="rgba(255,255,255,0.4)">PROTECTION ARCHITECTURE</text>
    <text x="1200" y="360" text-anchor="middle" fill="rgba(255,255,255,0.4)">DEPLOYMENT &amp; OVERSIGHT</text>
  </g>

  <!-- Node rings: flash triggers exactly at the moment the traveling dot arrives, never before -->
  <circle cx="230" cy="310" r="18" fill="none" stroke="#1E8FAD" stroke-width="1.5" opacity="0.4"/>
  <circle cx="230" cy="310" r="18" fill="none" stroke="#1E8FAD" stroke-width="1.5">
    <animate attributeName="r" values="30;18;18" keyTimes="0;0.045;1" dur="10s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.9;0;0" keyTimes="0;0.045;1" dur="10s" repeatCount="indefinite"/>
  </circle>
  <circle cx="230" cy="310" r="9" fill="#1E8FAD"/>

  <circle cx="610" cy="310" r="18" fill="none" stroke="#1E8FAD" stroke-width="1.5" opacity="0.4"/>
  <circle cx="610" cy="310" r="18" fill="none" stroke="#1E8FAD" stroke-width="1.5" opacity="0">
    <animate attributeName="r" values="18;18;30;18;18" keyTimes="0;0.2351;0.2351;0.28;1" dur="10s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0;0;0.9;0;0" keyTimes="0;0.2351;0.2351;0.28;1" dur="10s" repeatCount="indefinite"/>
  </circle>
  <circle cx="610" cy="310" r="9" fill="#1E8FAD"/>

  <circle cx="990" cy="310" r="18" fill="none" stroke="#1E8FAD" stroke-width="1.5" opacity="0.4"/>
  <circle cx="990" cy="310" r="18" fill="none" stroke="#1E8FAD" stroke-width="1.5" opacity="0">
    <animate attributeName="r" values="18;18;30;18;18" keyTimes="0;0.4701;0.4701;0.515;1" dur="10s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0;0;0.9;0;0" keyTimes="0;0.4701;0.4701;0.515;1" dur="10s" repeatCount="indefinite"/>
  </circle>
  <circle cx="990" cy="310" r="9" fill="#1E8FAD"/>

  <circle cx="1200" cy="310" r="18" fill="none" stroke="#1E8FAD" stroke-width="1.5" opacity="0.4"/>
  <circle cx="1200" cy="310" r="18" fill="none" stroke="#1E8FAD" stroke-width="1.5" opacity="0">
    <animate attributeName="r" values="18;18;30;18;18" keyTimes="0;0.6;0.6;0.645;1" dur="10s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0;0;0.9;0;0" keyTimes="0;0.6;0.6;0.645;1" dur="10s" repeatCount="indefinite"/>
  </circle>
  <circle cx="1200" cy="310" r="9" fill="#1E8FAD"/>

  <!-- Traveling pulse: crosses all four phases, ring flashes trigger exactly at these arrival points -->
  <circle r="7" fill="#1E8FAD">
    <animateMotion path="M 230 310 L 1200 310" dur="10s" begin="0s" repeatCount="indefinite" calcMode="linear" keyPoints="0;1" keyTimes="0;0.6"/>
    <animate attributeName="opacity" values="1;1;0;0" keyTimes="0;0.58;0.6;1" dur="10s" repeatCount="indefinite"/>
  </circle>

  <!-- Continuous cycle: dashed return arc, with its own traveling dot -->
  <path id="cyclePath" d="M 1200 400 C 950 520, 500 520, 230 400" fill="none" stroke="#1E8FAD" stroke-width="1.5" stroke-dasharray="6 8" opacity="0.5" marker-end="url(#arrowhead-back)"/>
  <text x="700" y="590" text-anchor="middle" font-family="Courier New, monospace" font-size="13" letter-spacing="1.5" fill="rgba(255,255,255,0.45)">CONTINUOUS CYCLE</text>

  <circle r="6" fill="#1E8FAD">
    <animateMotion dur="10s" begin="0s" repeatCount="indefinite" calcMode="linear" keyPoints="0;1" keyTimes="0;1">
      <mpath href="#cyclePath"/>
    </animateMotion>
    <animate attributeName="opacity" values="0;0;1;1;0" keyTimes="0;0.6;0.64;0.98;1" dur="10s" repeatCount="indefinite"/>
  </circle>
</svg>
