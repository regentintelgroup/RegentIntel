<svg viewBox="0 0 1400 680" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <pattern id="grid" width="56" height="56" patternUnits="userSpaceOnUse">
      <path d="M 56 0 L 0 0 0 56" fill="none" stroke="rgba(13,27,42,0.06)" stroke-width="1"/>
    </pattern>
    <marker id="arrowhead" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto">
      <path d="M0,0 L0,6 L9,3 z" fill="#1E8FAD"/>
    </marker>
  </defs>

  <rect width="1400" height="680" fill="url(#grid)"/>

  <!-- Three input paths -->
  <path id="safetyPath" d="M 220 150 C 420 150, 530 230, 610 340" fill="none" stroke="#1E8FAD" stroke-width="1.5" opacity="0.55"/>
  <path id="intelPath" d="M 220 340 L 610 340" fill="none" stroke="#1E8FAD" stroke-width="1.5" opacity="0.55"/>
  <path id="docPath" d="M 220 530 C 420 530, 530 450, 610 340" fill="none" stroke="#1E8FAD" stroke-width="1.5" opacity="0.55"/>

  <text x="190" y="145" text-anchor="end" font-family="Arial Narrow, Arial, sans-serif" font-weight="700" font-size="16" letter-spacing="1.5" fill="rgba(13,27,42,0.75)">SAFETY</text>
  <text x="190" y="345" text-anchor="end" font-family="Arial Narrow, Arial, sans-serif" font-weight="700" font-size="16" letter-spacing="1.5" fill="rgba(13,27,42,0.75)">INTELLIGENCE</text>
  <text x="190" y="535" text-anchor="end" font-family="Arial Narrow, Arial, sans-serif" font-weight="700" font-size="16" letter-spacing="1.5" fill="rgba(13,27,42,0.75)">DOCUMENTATION</text>

  <!-- Continuous streams of dots, each line feeding in at its own rate -->
  <circle r="4" fill="#1E8FAD">
    <animateMotion dur="2.2s" begin="0s" repeatCount="indefinite" calcMode="linear" keyPoints="0;1" keyTimes="0;1">
      <mpath href="#intelPath"/>
    </animateMotion>
    <animate attributeName="opacity" values="1;1;0" keyTimes="0;0.85;1" dur="2.2s" begin="0s" repeatCount="indefinite"/>
  </circle>
  <circle r="4" fill="#1E8FAD">
    <animateMotion dur="2.2s" begin="0.733s" repeatCount="indefinite" calcMode="linear" keyPoints="0;1" keyTimes="0;1">
      <mpath href="#intelPath"/>
    </animateMotion>
    <animate attributeName="opacity" values="1;1;0" keyTimes="0;0.85;1" dur="2.2s" begin="0.733s" repeatCount="indefinite"/>
  </circle>
  <circle r="4" fill="#1E8FAD">
    <animateMotion dur="2.2s" begin="1.467s" repeatCount="indefinite" calcMode="linear" keyPoints="0;1" keyTimes="0;1">
      <mpath href="#intelPath"/>
    </animateMotion>
    <animate attributeName="opacity" values="1;1;0" keyTimes="0;0.85;1" dur="2.2s" begin="1.467s" repeatCount="indefinite"/>
  </circle>
  <circle r="4" fill="#1E8FAD">
    <animateMotion dur="5.5s" begin="0s" repeatCount="indefinite" calcMode="linear" keyPoints="0;1" keyTimes="0;1">
      <mpath href="#safetyPath"/>
    </animateMotion>
    <animate attributeName="opacity" values="1;1;0" keyTimes="0;0.85;1" dur="5.5s" begin="0s" repeatCount="indefinite"/>
  </circle>
  <circle r="4" fill="#1E8FAD">
    <animateMotion dur="5.5s" begin="1.833s" repeatCount="indefinite" calcMode="linear" keyPoints="0;1" keyTimes="0;1">
      <mpath href="#safetyPath"/>
    </animateMotion>
    <animate attributeName="opacity" values="1;1;0" keyTimes="0;0.85;1" dur="5.5s" begin="1.833s" repeatCount="indefinite"/>
  </circle>
  <circle r="4" fill="#1E8FAD">
    <animateMotion dur="5.5s" begin="3.667s" repeatCount="indefinite" calcMode="linear" keyPoints="0;1" keyTimes="0;1">
      <mpath href="#safetyPath"/>
    </animateMotion>
    <animate attributeName="opacity" values="1;1;0" keyTimes="0;0.85;1" dur="5.5s" begin="3.667s" repeatCount="indefinite"/>
  </circle>
  <circle r="4" fill="#1E8FAD">
    <animateMotion dur="8.0s" begin="0s" repeatCount="indefinite" calcMode="linear" keyPoints="0;1" keyTimes="0;1">
      <mpath href="#docPath"/>
    </animateMotion>
    <animate attributeName="opacity" values="1;1;0" keyTimes="0;0.85;1" dur="8.0s" begin="0s" repeatCount="indefinite"/>
  </circle>
  <circle r="4" fill="#1E8FAD">
    <animateMotion dur="8.0s" begin="2.667s" repeatCount="indefinite" calcMode="linear" keyPoints="0;1" keyTimes="0;1">
      <mpath href="#docPath"/>
    </animateMotion>
    <animate attributeName="opacity" values="1;1;0" keyTimes="0;0.85;1" dur="8.0s" begin="2.667s" repeatCount="indefinite"/>
  </circle>
  <circle r="4" fill="#1E8FAD">
    <animateMotion dur="8.0s" begin="5.333s" repeatCount="indefinite" calcMode="linear" keyPoints="0;1" keyTimes="0;1">
      <mpath href="#docPath"/>
    </animateMotion>
    <animate attributeName="opacity" values="1;1;0" keyTimes="0;0.85;1" dur="8.0s" begin="5.333s" repeatCount="indefinite"/>
  </circle>

  <!-- Confluence point: continuous gentle pulse, always active -->
  <circle cx="610" cy="340" r="7" fill="none" stroke="#1E8FAD" stroke-width="1.5" opacity="0.5"/>
  <circle cx="610" cy="340" r="6" fill="#1E8FAD" opacity="0.85">
    <animate attributeName="r" values="6;9;6" dur="1.4s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.75;1;0.75" dur="1.4s" repeatCount="indefinite"/>
  </circle>

  <!-- Single output path, the merged doctrine, continuous flow -->
  <line x1="610" y1="340" x2="1290" y2="340" stroke="#1E8FAD" stroke-width="1.5" marker-end="url(#arrowhead)" opacity="0.9"/>
  <circle r="10" fill="#1E8FAD">
    <animateMotion path="M 610 340 L 1270 340" dur="9s" repeatCount="indefinite" calcMode="linear" keyPoints="0;1" keyTimes="0;1"/>
    <animate attributeName="opacity" values="1;1;0" keyTimes="0;0.88;1" dur="9s" repeatCount="indefinite"/>
  </circle>

  <text x="700" y="300" font-family="Arial Narrow, Arial, sans-serif" font-weight="700" font-size="42" letter-spacing="1" fill="#0D1B2A">REGENT <tspan fill="#1E8FAD">INTEL</tspan></text>
  <text x="702" y="335" font-family="Courier New, monospace" font-size="15" letter-spacing="3" fill="rgba(13,27,42,0.55)">A SINGLE OPERATIONAL DOCTRINE</text>
</svg>
